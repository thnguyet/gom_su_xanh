<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title id="pageTitle">Blog - Gốm Sứ Xanh</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../styles-pages.css">
  <style>
    .blog-detail-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 64px 24px 100px;
    }
    
    .blog-breadcrumb {
      display: block;
      color: var(--clr-forest);
      font-weight: 700;
      text-decoration: none;
      margin-bottom: 24px;
      font-size: 18px;
      text-align: center;
    }
    .blog-breadcrumb:hover {
      color: var(--clr-teal);
    }

    .blog-header {
      text-align: center;
      margin-bottom: 48px;
    }
    .blog-tag {
      display: inline-block;
      background: var(--clr-mint);
      color: var(--clr-forest);
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .blog-title {
      font-family: var(--font-heading);
      font-size: clamp(32px, 5vw, 48px);
      color: var(--clr-forest);
      line-height: 1.3;
      margin-bottom: 24px;
    }
    .blog-meta {
      font-size: 16px;
      color: var(--clr-forest);
      opacity: 0.8;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .blog-audio-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--clr-forest);
      color: white;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.3s;
      cursor: pointer;
      border: none;
    }
    .blog-audio-btn:hover {
      background: var(--clr-teal);
    }
    .blog-audio-icon {
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
      position: relative;
    }
    .blog-audio-icon::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 5px;
      border-left: 5px solid var(--clr-forest);
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
    }

    .blog-hero-img {
      width: 100%;
      height: auto;
      border-radius: 24px;
      margin-bottom: 48px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .blog-content {
      font-size: 20px;
      line-height: 1.8;
      color: var(--clr-forest);
      text-align: justify;
    }
    .blog-content p {
      margin-bottom: 24px;
    }
    .blog-content strong {
      color: var(--clr-teal);
    }
    .blog-content img {
      width: 100%;
      height: auto;
      border-radius: 16px;
      margin: 40px 0;
    }

    .blog-qna {
      background: rgba(254, 252, 245, 1);
      border-left: 4px solid var(--clr-teal);
      padding: 24px 32px;
      margin: 40px 0;
      border-radius: 0 16px 16px 0;
    }
    .blog-qna p {
      margin-bottom: 16px;
    }
    .blog-qna p:last-child {
      margin-bottom: 0;
    }

    /* Comment Section */
    .comment-section {
      margin-top: 80px;
      border-top: 1px solid rgba(148, 181, 120, 0.3);
      padding-top: 48px;
    }
    .comment-title {
      font-family: var(--font-heading);
      font-size: 28px;
      color: var(--clr-forest);
      margin-bottom: 24px;
    }
    .comment-form {
      display: flex;
      gap: 16px;
    }
    .comment-input {
      flex: 1;
      padding: 16px 24px;
      border: 1px solid var(--clr-forest);
      border-radius: 12px;
      font-size: 18px;
      background: rgba(254, 252, 245, 1);
      color: var(--clr-forest);
      outline: none;
    }
    .comment-input:focus {
      border-color: var(--clr-teal);
    }
    .comment-btn {
      padding: 16px 32px;
      background: var(--clr-forest);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.3s;
    }
    .comment-btn:hover {
      background: var(--clr-teal);
    }

    @media (max-width: 768px) {
      .comment-form { flex-direction: column; }
      .blog-qna { padding: 20px; }
    }
  </style>
</head>
<body>
  <main class="page-main">
    <div class="blog-detail-container">
      
      <a href="trang-blog_29-2.html" class="blog-breadcrumb">&larr; Blog Gốm Sứ Xanh</a>
      
      <header class="blog-header">
        <span class="blog-tag" id="postCategory">#Blog</span>
        <h1 class="blog-title" id="postTitle">...</h1>
        <div class="blog-meta">
          <span id="postDate">Phát hành: ...</span>
        </div>
      </header>

      <img src="" alt="Hero Blog" class="blog-hero-img" id="postImage" style="display:none">
      <div class="blog-content" id="postContent">
        <p>Đang tải nội dung...</p>
      </div>
      </div>


    </div>
  </main>
  <script src="../app.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var params = new URLSearchParams(window.location.search);
      var postId = params.get('id');
      
      if (!postId) {
        document.getElementById('postContent').innerHTML = '<p>Không tìm thấy bài viết.</p>';
        return;
      }

      function fmtFullDate(d) {
        if (!d) return '';
        var date = new Date(d);
        return 'Phát hành: Ngày ' + date.getDate() + ' tháng ' + (date.getMonth() + 1) + ' năm ' + date.getFullYear();
      }

      fetch('http://localhost:8080/content/posts/' + postId)
        .then(res => {
          if (!res.ok) throw new Error('Post not found');
          return res.json();
        })
        .then(p => {
          document.getElementById('pageTitle').textContent = p.title + ' - Gốm Sứ Xanh';
          document.getElementById('postTitle').textContent = p.title;
          document.getElementById('postCategory').textContent = '#' + (p.category ? p.category.name : 'Blog');
          document.getElementById('postDate').textContent = fmtFullDate(p.createdAt);
          
          var img = document.getElementById('postImage');
          if (p.thumbnail) {
            img.src = p.thumbnail;
            img.style.display = 'block';
          }

          // Hiển thị nội dung bài viết
          document.getElementById('postContent').innerHTML = p.content || '<p>Nội dung đang được cập nhật...</p>';
        })
        .catch(err => {
          console.error(err);
          document.getElementById('postContent').innerHTML = '<p>Lỗi: Không thể tải nội dung bài viết.</p>';
        });
    });
  </script>
</body>
</html>
