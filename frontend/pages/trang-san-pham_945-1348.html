<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sản phẩm - Gốm Sứ Xanh</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../styles-pages.css">
  <style>
    .category-scroll {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      padding: 20px 48px;
      margin-bottom: 40px;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      max-width: 1280px;
      margin: 0 auto 40px;
    }
    .category-scroll::-webkit-scrollbar { display: none; }
    .category-card {
      position: relative;
      flex: 0 0 220px;
      height: 320px;
      border-radius: 12px;
      overflow: hidden;
      scroll-snap-align: start;
      text-decoration: none;
      display: block;
      border: 1px solid rgba(148,181,120,.3);
      box-shadow: 0 4px 20px rgba(28,61,30,.08);
      transition: transform 0.3s ease;
    }
    .category-card:hover { transform: translateY(-4px); }
    .category-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .category-card .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(28,61,30,0.8) 0%, rgba(28,61,30,0.2) 100%);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 24px;
    }
    .category-card h3 {
      color: var(--clr-cream);
      font-family: var(--font-heading);
      font-size: 22px;
      margin: 0;
      text-align: center;
      line-height: 1.3;
    }
    .products-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      max-width: 1160px;
      margin: 0 auto 32px;
      padding: 0 40px;
    }
    .product-count {
      color: var(--clr-forest);
      font-size: 16px;
      opacity: 0.8;
      margin-bottom: 6px;
    }
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 64px;
      padding-bottom: 80px;
    }
    .page-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      color: var(--clr-forest);
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.2s;
    }
    .page-btn:hover { background: rgba(148,181,120,.2); }
    .page-btn.is-active {
      background: var(--clr-moss);
      color: var(--clr-cream);
    }
    .page-next { width: auto; padding: 0 16px; }
  </style>
</head>
<body>

  <main class="page-main">
    
    <div class="category-scroll" id="categoryScroll">
      <!-- Categories will be dynamically loaded here -->
    </div>

    <!-- Products Header -->
    <div class="products-header">
      <div class="product-count" id="productCount">Đang tải...</div>
      <h1 class="section-title all-caps" style="margin:0">SẢN PHẨM TỪ GỐM SỨ XANH</h1>
      <div style="width: 180px;"></div> <!-- spacer for centering -->
    </div>

    <!-- Products Grid -->
    <div class="cards-section" style="padding-top: 0;">
      <div class="cards-grid" id="productsGrid">
        <!-- Products will be injected here via JS -->
      </div>

      <!-- Pagination -->
      <div class="pagination" id="productsPagination">
        <!-- Pagination will be injected here via JS -->
      </div>
    </div>
  </main>

  <script src="../app.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var currentPage = 0;
      var pageSize = 8;
      var currentCategoryId = null;

      function loadProducts(page) {
        var url = 'http://localhost:8080/product/products/all?page=' + page + '&size=' + pageSize;
        if (currentCategoryId) {
          url += '&categoryId=' + currentCategoryId;
        }
        fetch(url)
          .then(res => res.json())
          .then(data => {
            // Spring Data JPA Page format
            var pageData = data.data || data; // depending on ApiResponse wrapper
            if (data.code === 1000 && data.result) {
              pageData = data.result;
            }
            
            var content = pageData.content || [];
            var totalElements = pageData.totalElements || 0;
            var totalPages = pageData.totalPages || 0;
            
            // Update Header
            var fromItem = page * pageSize + 1;
            var toItem = Math.min((page + 1) * pageSize, totalElements);
            if (totalElements === 0) {
              document.getElementById('productCount').textContent = 'Không có sản phẩm nào.';
            } else {
              document.getElementById('productCount').textContent = 'Hiển thị ' + fromItem + '-' + toItem + ' / ' + totalElements + ' sản phẩm';
            }

            // Render Products
            var grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            content.forEach(p => {
              var imageUrl = (p.imageUrls && p.imageUrls.length > 0) ? p.imageUrls[0] : '../assets/images/placeholder.jpg';
              var priceStr = new Intl.NumberFormat('vi-VN').format(p.price || 0) + 'VNĐ';
              var detailUrl = 'trang-san-pham-chi-tiet.html?slug=' + (p.slug || p.id);
              
              var isOutOfStock = (p.stockQuantity <= 0);
              var btnText = isOutOfStock ? 'Hết hàng' : 'Mua ngay';
              var btnStyle = isOutOfStock ? 'background: #ccc; color: #666; cursor: not-allowed;' : '';
              
              var card = document.createElement('div');
              card.className = 'gsx-card';
              card.innerHTML = `
                <a href="${detailUrl}" class="gsx-card-link-mask"></a>
                <img src="${imageUrl}" alt="${p.name}">
                <div class="gsx-card-body">
                  <h3 class="gsx-card-title">${p.name}</h3>
                  <p class="gsx-card-price">${priceStr}</p>
                  <a href="${isOutOfStock ? '#' : detailUrl}" class="gsx-card-btn" style="${btnStyle}">${btnText}</a>
                </div>
              `;
              grid.appendChild(card);
            });

            // Render Pagination
            var pagination = document.getElementById('productsPagination');
            pagination.innerHTML = '';
            if (totalPages > 1) {
              for (let i = 0; i < totalPages; i++) {
                let btn = document.createElement('a');
                btn.href = '#';
                btn.className = 'page-btn' + (i === page ? ' is-active' : '');
                btn.textContent = i + 1;
                btn.addEventListener('click', function(e) {
                  e.preventDefault();
                  currentPage = i;
                  loadProducts(currentPage);
                  window.scrollTo({ top: 300, behavior: 'smooth' });
                });
                pagination.appendChild(btn);
              }
            }
          })
          .catch(err => {
            console.error('Lỗi khi tải sản phẩm:', err);
            document.getElementById('productCount').textContent = 'Lỗi kết nối máy chủ.';
          });
      }

      function loadCategories() {
        fetch('http://localhost:8080/product/categories?size=4')
          .then(res => res.json())
          .then(data => {
            var categories = data.content || (data.result ? data.result.content : []) || (Array.isArray(data) ? data : []);
            var scroll = document.getElementById('categoryScroll');
            
            // Add "All" Category
            var allHtml = `
              <a href="#" class="category-card" data-id="null" style="border: 3px solid var(--clr-moss)">
                <img src="../assets/images/3838a9d43772b2011d5823350fb83965460ef7e7.jpg" alt="Tất cả">
                <div class="overlay"><h3>Tất cả<br>sản phẩm</h3></div>
              </a>
            `;
            
            var html = allHtml;
            categories.forEach(cat => {
              var catImg = cat.imageUrl || "../assets/images/placeholder.jpg";
              html += `
                <a href="#" class="category-card" data-id="${cat.id}">
                  <img src="${catImg}" alt="${cat.name}">
                  <div class="overlay"><h3>${cat.name}</h3></div>
                </a>
              `;
            });
            scroll.innerHTML = html;

            // Add Click Events
            scroll.querySelectorAll('.category-card').forEach(card => {
              card.addEventListener('click', function(e) {
                e.preventDefault();
                var id = this.getAttribute('data-id');
                currentCategoryId = (id === 'null') ? null : id;
                currentPage = 0;
                loadProducts(currentPage);
                
                // Highlight active category
                scroll.querySelectorAll('.category-card').forEach(c => c.style.border = '1px solid rgba(148,181,120,.3)');
                this.style.border = '3px solid var(--clr-moss)';
              });
            });
          })
          .catch(err => console.error('Lỗi tải danh mục:', err));
      }

      loadCategories();
      loadProducts(currentPage);
    });
  </script>
</body>
</html>
