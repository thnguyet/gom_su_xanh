server:
  port: 8082
spring:
  application:
    name: product-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/product_service}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
jwt:
  signerKey: ${JWT_SIGNER_KEY}

cloudinary:
  cloud-name: ${CLOUDINARY_NAME:thunguyet}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}