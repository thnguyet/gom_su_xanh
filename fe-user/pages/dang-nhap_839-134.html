    .login-page {
      min-height: 100vh;
      background-image: url('../assets/images/6799477a82bcda0f3d8ceb8313f7b1cef21ffdcd.png');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
    }

    .login-page::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(241, 239, 228, .72);
      z-index: 0;
      pointer-events: none;
    }

    .login-page .nav {
      background: rgba(255, 253, 246, .92);
    }

    .login-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      padding-top: calc(var(--nav-h) + 40px);
      position: relative;
      z-index: 1;
    }

    .login-box {
      width: 100%;
      max-width: 520px;
    }

    .form-title {

      font-size: clamp(28px, 5vw, 40px);
      font-weight: 900;
      color: var(--clr-teal);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin: 0 0 36px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-input {
      width: 100%;
      padding: 16px 22px;
      border: 1.5px solid var(--clr-clay);
      border-radius: var(--radius-pill);
      background: rgba(255, 253, 246, .9);

      font-size: 16px;
      color: var(--clr-forest);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }

    .form-input::placeholder {
      color: #8a9a7a;
    }

    .form-input:focus {
      border-color: var(--clr-teal);
      box-shadow: 0 0 0 4px rgba(46, 125, 96, .1);
    }

    .form-forgot {
      display: block;
      margin: 10px 0 24px;
      font-size: 15px;
      color: var(--clr-forest);
      font-weight: 500;
    }

    .form-submit {
      width: 100%;
      padding: 15px;
      border: 1.5px solid var(--clr-teal);
      border-radius: var(--radius-pill);
      background: transparent;
      color: var(--clr-teal);
      font-family: 'Afacad', Arial, sans-serif;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all .25s;
      letter-spacing: .02em;
      box-shadow: 0 4px 8px rgba(0, 0, 0, .15);
    }

    .form-submit:hover {
      background: var(--clr-teal);
      color: var(--clr-cream);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, .2);
    }

    .form-submit-solid {
      background: var(--clr-moss);
      border-color: var(--clr-moss);
      color: var(--clr-cream);
    }

    .form-submit-solid:hover {
      background: var(--clr-teal);
      border-color: var(--clr-teal);
      transform: translateY(-2px);
    }

    .form-alt {
      text-align: center;
      margin-top: 22px;
      font-size: 15px;
      color: var(--clr-forest);
    }

    .form-alt a {
      color: var(--clr-teal);
      font-weight: 700;
      text-decoration: none;
    }

    .form-alt a:hover {
      text-decoration: underline;
    }

    .form-divider {
      text-align: center;
      margin: 24px 0 12px;
      font-size: 15px;
      color: #7a8a6a;
    }

    .form-social-title {
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      color: var(--clr-forest);
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .form-social-btns {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .form-social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: var(--clr-cream);
      border: 1.5px solid var(--clr-clay);
      text-decoration: none;
      font-size: 26px;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .07);
    }

    .form-social-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 4px 16px rgba(0, 0, 0, .12);
    }
    
    /* Password Toggle */
    .password-input-wrapper { position: relative; width: 100%; }
    .toggle-password-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--clr-forest);
      opacity: 0.6;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: opacity 0.2s;
    }
    .toggle-password-btn:hover { 
      opacity: 1; 
      transform: translateY(-50%) scale(1.1) !important;
    }
  </style>
</head>

  <!-- FORM -->
  <div class="login-wrap">
    <div class="login-box">
      <h1 class="form-title">Đăng nhập</h1>

      <div class="form-group">
        <input class="form-input app-field-native" id="login-email" type="text" placeholder="Email/Số điện thoại"
          autocomplete="username">
      </div>
      <div class="form-group">
        <div class="password-input-wrapper">
          <input class="form-input app-field-native" id="login-password" type="password" placeholder="Mật khẩu"
            autocomplete="current-password">
          <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility('login-password', this)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
      </div>

      <a class="form-forgot" href="#">Quên mật khẩu?</a>

      <button class="form-submit" id="loginBtn" type="button">Đăng nhập</button>

      <div class="form-alt">
        Chưa có tài khoản? <a href="dang-ky_147-84.html">Đăng kí ngay!</a>
      </div>

      <div class="form-divider">hoặc</div>
      <div class="form-social-title">Đăng nhập bằng</div>
      <div class="form-social-btns">
        <a class="form-social-btn" href="#" title="Google">🔵</a>
        <a class="form-social-btn" href="https://www.facebook.com/profile.php?id=100095447280090" target="_blank"
          title="Facebook">📘</a>
      </div>
    </div>
  </div>

  <script src="../app.js" defer></script>
  <script>
    function togglePasswordVisibility(inputId, btn) {
      var input = document.getElementById(inputId);
      var svg = btn.querySelector('svg');
      if (input.type === 'password') {
        input.type = 'text';
        svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
      } else {
        input.type = 'password';
        svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
      }
    }

    // Ensure clean state when on login page
    (function () {
      localStorage.removeItem('gsx_logged_in');
      localStorage.removeItem('gsx_token');
      localStorage.removeItem('adm_token');
    })();

    // Login button — unified flow with exception for hardcoded admin
    document.getElementById('loginBtn').addEventListener('click', function () {
      var email = document.getElementById('login-email').value.trim();
      var pass = document.getElementById('login-password').value.trim();

      if (!email || !pass) {
        alert('Vui lòng điền đầy đủ thông tin.');
        return;
      }

      // --- EXCEPTION FOR ADMIN/ADMIN ---
      // Bỏ qua validate backend vì mật khẩu "admin" không khớp Regex bảo mật
      if (email === 'admin' && pass === 'admin') {
        console.log('Admin bypass triggered');
        localStorage.setItem('gsx_logged_in', JSON.stringify(true));
        localStorage.setItem('gsx_token', 'admin_bypass_token');
        localStorage.setItem('adm_token', 'admin_local');
        window.location.href = '../../fe-admin/index.html';
        return;
      }

      var submitBtn = this;
      var originalText = submitBtn.textContent;
      submitBtn.textContent = 'Đang xử lý...';
      submitBtn.disabled = true;

      fetch('http://localhost:8080/identity/auth/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: pass })
      })
        .then(function (res) { return res.json(); })
        .then(function (data) {
          if (data.code === 1000 || data.result || data.token) {
            var tkn = data.result ? data.result.token : data.token;
            localStorage.setItem('gsx_logged_in', JSON.stringify(true));
            localStorage.setItem('gsx_token', tkn);

            // Check user role to decide redirect destination
            fetch('http://localhost:8080/identity/users/my-infor', {
              headers: { 'Authorization': 'Bearer ' + tkn }
            })
              .then(function (r) { return r.json(); })
              .then(function (user) {
                var role = (user.roles || '').toUpperCase();
                if (role === 'ADMIN') {
                  localStorage.setItem('adm_token', tkn);
                  window.location.href = '../../fe-admin/index.html';
                } else {
                  window.location.href = 'ho-so-ca-nhan_147-86#profile';
                }
              })
              .catch(function () {
                window.location.href = 'ho-so-ca-nhan_147-86#profile';
              });
          } else {
            // Xử lý lỗi validate từ backend (ví dụ: mật khẩu ko đúng định dạng)
            var errorMsg = data.message || 'Sai thông tin đăng nhập';
            if (data.details && Array.isArray(data.details)) {
              errorMsg = data.details[0]; // Lấy lỗi validate đầu tiên
            }
            alert('Đăng nhập thất bại: ' + errorMsg);
            submitBtn.textContent = originalText;
            submitBtn.disabled = false;
          }
        })
        .catch(function (err) {
          console.error(err);
          alert('Lỗi kết nối đến máy chủ.');
          submitBtn.textContent = originalText;
          submitBtn.disabled = false;
        });
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
  </script>
