server:
  port: 8083
spring:
  application:
    name: order-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/order_service}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
eureka:
  client:
    enabled: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
jwt:
  signerKey: ${JWT_SIGNER_KEY}
